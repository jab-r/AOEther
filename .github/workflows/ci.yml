name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev

      - name: Build talker
        run: make -C talker

      - name: Build receiver
        run: make -C receiver

      - name: Smoke-check binaries
        run: |
          ./talker/build/talker --help || true
          ./receiver/build/receiver --help || true
